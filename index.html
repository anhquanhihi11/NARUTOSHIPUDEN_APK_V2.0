<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberCore Premium - Quản Lý Chấm Công</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(120% 120% at 50% 10%, #0f172a 40%, #020617 100%);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 20px; }
        
        /* Ép font chữ từ 16px trở lên chống tự động phóng màn hình trên iPhone */
        input, select, button {
            font-size: 16px !important;
        }
        /* Tối ưu hóa ô chọn giờ dạng time của iOS */
        input[type="time"] {
            color-scheme: dark;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-28 antialiased">

    <header class="sticky top-0 z-40 w-full glass-panel border-b border-slate-800/80 px-4 py-3.5 shadow-lg">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="absolute -inset-1 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 opacity-70 blur-md animate-pulse"></div>
                    <div class="relative bg-slate-900 text-amber-400 p-2.5 rounded-xl font-bold text-xl border border-amber-500/30">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                </div>
                <div>
                    <h1 class="text-sm font-extrabold tracking-wider bg-gradient-to-r from-slate-100 to-slate-400 bg-clip-text text-transparent uppercase">CyberCore Pro</h1>
                    <p class="text-xs font-medium text-amber-400/90" id="current-month-txt">Tháng --/----</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-900/90 px-3 py-1.5 rounded-xl border border-slate-700/60 shadow-inner">
                <i class="fa-solid fa-coins text-amber-500 text-xs"></i>
                <div class="text-left">
                    <p class="text-[9px] uppercase font-bold tracking-tight text-slate-400">Lương / Giờ</p>
                    <div class="flex items-center gap-1">
                        <input type="number" id="hourly-rate-input" value="25000" step="1000" min="0" onchange="updateHourlyRate()"
                            class="w-20 bg-transparent text-sm font-bold text-slate-100 focus:outline-none focus:text-amber-400 transition-colors">
                        <span class="text-[10px] font-bold text-slate-400">đ</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 mt-5">
        <div class="glass-panel rounded-2xl p-4 shadow-xl border border-slate-700/40 relative overflow-hidden">
            <p class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Ước tính thu nhập tháng này</p>
            <div class="mt-1 flex items-baseline gap-1.5">
                <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-orange-400 to-yellow-200" id="stat-total-salary">0</span>
                <span class="text-xs font-bold text-amber-400/80 uppercase">VNĐ</span>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-slate-700/50 text-center">
                <div class="bg-slate-900/40 p-2 rounded-xl border border-slate-800/60">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Làm việc</p>
                    <p class="text-sm font-extrabold text-emerald-400 mt-0.5" id="stat-work">0 ngày</p>
                    <p class="text-[9px] text-slate-500 mt-0.5" id="stat-work-hours">0h chính</p>
                </div>
                <div class="bg-slate-900/40 p-2 rounded-xl border border-slate-800/60">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Tăng ca</p>
                    <p class="text-sm font-extrabold text-amber-400 mt-0.5" id="stat-ot">0 giờ</p>
                    <p class="text-[9px] text-slate-500 mt-0.5" id="stat-ot-salary">+0đ</p>
                </div>
                <div class="bg-slate-900/40 p-2 rounded-xl border border-slate-800/60">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Nghỉ phép</p>
                    <p class="text-sm font-extrabold text-rose-400 mt-0.5" id="stat-leave">0 / 0</p>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 mt-5">
        <div id="calendar-container" class="space-y-2.5 max-h-[55vh] overflow-y-auto pr-1 custom-scroll"></div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 z-50 px-4 flex justify-center">
        <button onclick="openTodayModal()" class="bg-gradient-to-r from-amber-500 via-orange-500 to-amber-600 text-slate-900 font-bold px-6 py-3 rounded-full shadow-xl shadow-amber-500/20 active:scale-95 transition-all flex items-center gap-2 text-xs uppercase tracking-wider">
            <i class="fa-solid fa-fingerprint text-sm"></i> Chấm công hôm nay
        </button>
    </div>

    <div id="attendance-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[99] flex items-end sm:items-center justify-center p-0 sm:p-4 hidden" style="-webkit-tap-highlight-color: transparent;">
        <div class="bg-slate-800/95 w-full max-w-md rounded-t-3xl sm:rounded-2xl border-t sm:border border-slate-700/60 p-6 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto custom-scroll">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2.5">
                    <h3 class="text-sm font-bold text-slate-300 uppercase tracking-wider">Chi Tiết Ngày</h3>
                    <p id="modal-date-str" class="text-base font-extrabold text-amber-400">--/--/----</p>
                </div>
                <button onclick="closeModal()" class="bg-slate-900/60 text-slate-400 p-2 rounded-full border border-slate-700/40 w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="space-y-2">
                <label class="block text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">Trạng thái điểm danh</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="selectStatus('work')" id="btn-status-work" class="py-3 rounded-xl border text-xs font-bold bg-slate-900 border-slate-700/60 flex flex-col items-center gap-1.5 text-slate-400">Đi làm</button>
                    <button type="button" onclick="selectStatus('leave_allowed')" id="btn-status-leave_allowed" class="py-3 rounded-xl border text-xs font-bold bg-slate-900 border-slate-700/60 flex flex-col items-center gap-1.5 text-slate-400">Nghỉ phép</button>
                    <button type="button" onclick="selectStatus('leave_unallowed')" id="btn-status-leave_unallowed" class="py-3 rounded-xl border text-xs font-bold bg-slate-900 border-slate-700/60 flex flex-col items-center gap-1.5 text-slate-400">Không phép</button>
                </div>
            </div>

            <div id="main-shift-container" class="space-y-3 bg-slate-900/40 p-3.5 rounded-xl border border-slate-700/40">
                <div class="flex justify-between items-center">
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-wider">Số giờ ca chính</label>
                    <span class="text-xs font-bold text-amber-400" id="shift-hours-display">8 giờ</span>
                </div>
                <input type="range" id="shift-hours" min="0" max="16" step="0.5" value="8" oninput="document.getElementById('shift-hours-display').innerText = this.value + ' giờ'"
                    class="w-full accent-amber-500 h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                
                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-800">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Giờ vào ca</label>
                        <input type="time" id="main-start-time" value="08:00" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 font-medium focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Giờ về ca</label>
                        <input type="time" id="main-end-time" value="17:00" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 font-medium focus:outline-none focus:border-amber-500">
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/40 space-y-3">
                <div class="flex items-center justify-between">
                    <label for="ot-toggle" class="text-[11px] font-extrabold text-slate-300 uppercase tracking-wider cursor-pointer">Có làm thêm ca (OT)</label>
                    <input type="checkbox" id="ot-toggle" onchange="toggleOTField()" class="w-5 h-5 text-amber-500 bg-slate-800 border-slate-600 rounded accent-amber-500">
                </div>
                
                <div id="ot-input-container" class="hidden space-y-3 pt-2 border-t border-slate-800">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Số giờ tăng ca</label>
                        <input type="number" id="ot-hours" min="0" max="24" step="0.5" placeholder="Nhập số giờ tăng ca" 
                               class="w-full bg-slate-800 border border-slate-700 rounded-xl py-2.5 px-4 text-base font-bold text-amber-400 focus:outline-none focus:border-amber-500">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Giờ vào tăng ca</label>
                            <input type="time" id="ot-start-time" value="18:00" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 font-medium focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Giờ về tăng ca</label>
                            <input type="time" id="ot-end-time" value="21:00" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 font-medium focus:outline-none focus:border-amber-500">
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 bg-slate-900/30 p-3 rounded-xl border border-slate-800">
                <div>
                    <label class="block text-[9px] uppercase font-bold text-slate-400">Hệ số ca chính</label>
                    <p class="text-xs font-bold text-slate-300 mt-0.5">x 1.0</p>
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-bold text-slate-400">Hệ số tăng ca</label>
                    <select id="ot-multiplier" class="bg-slate-900 border border-slate-700 text-sm text-amber-400 font-bold rounded-lg p-1 mt-0.5 focus:outline-none w-full">
                        <option value="1.0">x 1.0</option>
                        <option value="1.5" selected>x 1.5</option>
                        <option value="2.0">x 2.0</option>
                    </select>
                </div>
            </div>

            <button onclick="saveAttendance()" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 text-slate-900 font-extrabold py-3.5 rounded-xl text-xs uppercase tracking-widest block relative z-50">Lưu Dữ Liệu Chấm Công</button>
        </div>
    </div>

    <script>
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        const currentDateNum = today.getDate();

        document.getElementById('current-month-txt').innerText = `Tháng ${String(currentMonth + 1).padStart(2, '0')}/${currentYear}`;

        let attendanceData = {};
        let hourlyRate = 25000;
        let db;

        let selectedDayKey = null; let selectedStatusStr = null;
        const weekdays = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];

        function initDB() {
            return new Promise((resolve) => {
                let request = indexedDB.open("CyberCoreDB", 2); // Nâng phiên bản DB để đồng bộ cấu trúc mới
                
                request.onupgradeneeded = function(e) {
                    let dbRes = e.target.result;
                    if (!dbRes.objectStoreNames.contains("settings")) {
                        dbRes.createObjectStore("settings");
                    }
                    if (!dbRes.objectStoreNames.contains("attendance")) {
                        dbRes.createObjectStore("attendance");
                    }
                };

                request.onsuccess = function(e) {
                    db = e.target.result;
                    resolve();
                };
            });
        }

        function loadDataFromDB() {
            return new Promise((resolve) => {
                let tx = db.transaction(["settings", "attendance"], "readonly");
                let settingsStore = tx.objectStore("settings");
                let attendanceStore = tx.objectStore("attendance");

                let reqRate = settingsStore.get("hourlyRate");
                reqRate.onsuccess = function() {
                    if (reqRate.result) {
                        hourlyRate = reqRate.result;
                        document.getElementById('hourly-rate-input').value = hourlyRate;
                    }
                };

                attendanceData = {};
                attendanceStore.openCursor().onsuccess = function(e) {
                    let cursor = e.target.result;
                    if (cursor) {
                        attendanceData[cursor.key] = cursor.value;
                        cursor.continue();
                    } else {
                        resolve();
                    }
                };
            });
        }

        function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }

        if(typeof window.updateHourlyRate !== 'function') {
            window.updateHourlyRate = function() {
                const val = parseInt(document.getElementById('hourly-rate-input').value);
                if (!isNaN(val) && val >= 0) {
                    hourlyRate = val;
                    let tx = db.transaction("settings", "readwrite");
                    tx.objectStore("settings").put(hourlyRate, "hourlyRate");
                    renderCalendar(); updateStats();
                }
            }
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            const totalDays = getDaysInMonth(currentYear, currentMonth);

            for (let d = totalDays; d >= 1; d--) {
                const dateObj = new Date(currentYear, currentMonth, d);
                const dayOfWeek = weekdays[dateObj.getDay()];
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const record = attendanceData[dateKey] || { status: 'none', shiftHours: 8, ot: 0, otMult: 1.5, mainStart: '08:00', mainEnd: '17:00', otStart: '18:00', otEnd: '21:00' };
                
                let statusMarkup = `<span class="text-[10px] text-slate-500 bg-slate-900 px-2 py-1 rounded-lg border border-slate-800 font-bold uppercase tracking-wider">Chưa chấm</span>`;
                let dayBg = "bg-slate-800/20 border-slate-800/60"; let earningsText = "";
                let timeLogsMarkup = ""; // Chuỗi hiển thị dòng thời gian làm việc trên danh sách

                if (record.status === 'work') {
                    const mainHoursEarn = parseFloat(record.shiftHours || 8) * hourlyRate;
                    const otEarn = parseFloat(record.ot || 0) * hourlyRate * parseFloat(record.otMult || 1.5);
                    const dayEarning = mainHoursEarn + otEarn;

                    statusMarkup = `<span class="text-[10px] text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-lg border border-emerald-500/20 font-bold uppercase tracking-wider">Đi làm</span>`;
                    dayBg = "bg-emerald-950/15 border-emerald-900/30";
                    earningsText = `<p class="text-xs font-black text-emerald-400 text-right">+${dayEarning.toLocaleString('vi-VN')}đ</p>`;
                    
                    // Thiết lập hiển thị chuỗi thời gian ca chính
                    let mainTimeStr = (record.mainStart && record.mainEnd) ? `${record.mainStart}-${record.mainEnd}` : "08:00-17:00";
                    timeLogsMarkup = `<span class="text-[9px] text-slate-400 bg-slate-900/80 px-1.5 py-0.5 rounded border border-slate-800"><i class="fa-regular fa-clock mr-1 text-[8px] text-slate-500"></i>${mainTimeStr}</span>`;
                    
                    // Nếu có tăng ca, hiển thị thêm thời gian tăng ca
                    if (record.ot > 0 && record.otStart && record.otEnd) {
                        timeLogsMarkup += `<span class="text-[9px] text-amber-400 bg-amber-950/40 px-1.5 py-0.5 rounded border border-amber-900/30 ml-1.5"><i class="fa-regular fa-clock mr-1 text-[8px] text-amber-500"></i>OT: ${record.otStart}-${record.otEnd}</span>`;
                    }
                } else if (record.status === 'leave_allowed') {
                    statusMarkup = `<span class="text-[10px] text-amber-400 bg-amber-500/10 px-2 py-1 rounded-lg border border-amber-500/20 font-bold uppercase tracking-wider">Có Phép</span>`;
                    dayBg = "bg-slate-800/30 border-slate-700/40"; earningsText = `<p class="text-xs font-bold text-slate-500 text-right">Nghỉ phép</p>`;
                } else if (record.status === 'leave_unallowed') {
                    statusMarkup = `<span class="text-[10px] text-rose-400 bg-rose-500/10 px-2 py-1 rounded-lg border border-rose-500/20 font-bold uppercase tracking-wider">Không Phép</span>`;
                    dayBg = "bg-rose-950/15 border-rose-900/30"; earningsText = `<p class="text-xs font-bold text-rose-500 text-right">0đ</p>`;
                }

                let badgesMarkup = `<span class="text-[9px] bg-slate-900 text-slate-400 px-1.5 py-0.5 rounded border border-slate-700 font-semibold">${record.shiftHours || 8}h chính</span>`;
                
                // GIỮ NGUYÊN: Hiển thị rõ số tiền tăng ca thực tế
                if (record.ot > 0) {
                    const actualOtMoney = parseFloat(record.ot) * hourlyRate * parseFloat(record.otMult || 1.5);
                    badgesMarkup += `<span class="text-[9px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded border border-amber-500/30 font-extrabold ml-1.5">Tăng ca +${actualOtMoney.toLocaleString('vi-VN')}đ (+${record.ot}h)</span>`;
                }

                const isToday = (d === currentDateNum);
                const cardRow = document.createElement('div');
                cardRow.className = `glass-panel flex flex-col justify-between p-3 rounded-xl border ${dayBg} ${isToday ? 'border-amber-500 ring-2 ring-amber-500/20' : 'border-slate-800'} hover:border-slate-600 transition-all cursor-pointer gap-2`;
                cardRow.setAttribute('onclick', `openModal('${dateKey}', ${d})`);
                cardRow.innerHTML = `
                    <div class="flex items-center justify-between w-full">
                        <div class="flex items-center gap-3">
                            <div class="text-center min-w-[42px] bg-slate-950 p-2 rounded-xl border border-slate-800/80">
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${dayOfWeek === "Chủ Nhật" ? "CN" : dayOfWeek.replace("Thứ ", "T")}</p>
                                <p class="text-base font-black ${dayOfWeek === "Chủ Nhật" ? "text-rose-400" : "text-slate-100"}">${d}</p>
                            </div>
                            <div>
                                <p class="text-xs font-extrabold ${isToday ? 'text-amber-400' : 'text-slate-200'}">${isToday ? 'Hôm nay' : 'Ngày ' + d}</p>
                                <div class="flex items-center gap-1 mt-1">${record.status === 'work' ? badgesMarkup : '<p class="text-[10px] text-slate-500">Bấm để nhập công</p>'}</div>
                            </div>
                        </div>
                        <div class="space-y-1">${earningsText}<div class="text-right">${statusMarkup}</div></div>
                    </div>
                    ${record.status === 'work' && timeLogsMarkup ? `<div class="flex items-center gap-1.5 border-t border-slate-800/40 pt-1.5">${timeLogsMarkup}</div>` : ''}
                `;
                container.appendChild(cardRow);
            }
        }

        function updateStats() {
            let totalWorkDays = 0, totalLeaveAllowed = 0, totalLeaveUnallowed = 0, totalMainHours = 0, totalOTHours = 0, totalEarnings = 0, totalOTEarnings = 0;
            Object.values(attendanceData).forEach(record => {
                if (record.status === 'work') {
                    totalWorkDays++;
                    const mainH = parseFloat(record.shiftHours || 8); const otH = parseFloat(record.ot || 0); const multiplier = parseFloat(record.otMult || 1.5);
                    totalMainHours += mainH; totalOTHours += otH;
                    const dayOTSalary = otH * hourlyRate * multiplier;
                    totalOTEarnings += dayOTSalary; totalEarnings += ((mainH * hourlyRate) + dayOTSalary);
                }
                if (record.status === 'leave_allowed') totalLeaveAllowed++; if (record.status === 'leave_unallowed') totalLeaveUnallowed++;
            });

            document.getElementById('stat-total-salary').innerText = totalEarnings.toLocaleString('vi-VN');
            document.getElementById('stat-work').innerText = `${totalWorkDays} ngày`;
            document.getElementById('stat-work-hours').innerText = `${totalMainHours}h chính`;
            document.getElementById('stat-ot').innerText = `${totalOTHours} giờ`;
            document.getElementById('stat-ot-salary').innerText = `+${totalOTEarnings.toLocaleString('vi-VN')}đ`;
        }

        function openTodayModal() { openModal(`${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(currentDateNum).padStart(2, '0')}`, currentDateNum); }
        
        function openModal(dateKey, dayNum) {
            selectedDayKey = dateKey; document.getElementById('modal-date-str').innerText = `${String(dayNum).padStart(2, '0')} Th${currentMonth + 1}, ${currentYear}`;
            const r = attendanceData[dateKey] || { status: 'none', shiftHours: 8, ot: 0, otMult: 1.5, mainStart: '08:00', mainEnd: '17:00', otStart: '18:00', otEnd: '21:00' };
            
            document.getElementById('shift-hours').value = r.shiftHours || 8;
            document.getElementById('shift-hours-display').innerText = (r.shiftHours || 8) + " giờ";
            
            // Điền thời gian đi làm ca chính vào form
            document.getElementById('main-start-time').value = r.mainStart || '08:00';
            document.getElementById('main-end-time').value = r.mainEnd || '17:00';
            
            selectStatus(r.status);
            
            if (r.ot > 0) {
                document.getElementById('ot-toggle').checked = true; document.getElementById('ot-input-container').classList.remove('hidden');
                document.getElementById('ot-hours').value = r.ot;
                // Điền thời gian tăng ca vào form
                document.getElementById('ot-start-time').value = r.otStart || '18:00';
                document.getElementById('ot-end-time').value = r.otEnd || '21:00';
            } else {
                document.getElementById('ot-toggle').checked = false; document.getElementById('ot-input-container').classList.add('hidden');
                document.getElementById('ot-hours').value = '';
                document.getElementById('ot-start-time').value = '18:00';
                document.getElementById('ot-end-time').value = '21:00';
            }
            document.getElementById('ot-multiplier').value = r.otMult || "1.5";
            document.getElementById('attendance-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('attendance-modal').classList.add('hidden'); }
        function toggleOTField() {
            const isChecked = document.getElementById('ot-toggle').checked;
            document.getElementById('ot-input-container').className = isChecked ? "block space-y-3" : "hidden";
        }

        function selectStatus(status) {
            selectedStatusStr = status;
            ['work', 'leave_allowed', 'leave_unallowed'].forEach(s => {
                const btn = document.getElementById(`btn-status-${s}`);
                if (s === status) {
                    btn.className = `py-3 rounded-xl border text-xs font-bold text-center transition-all ${s==='work'?'bg-emerald-500/10 border-emerald-500 text-emerald-400':s==='leave_allowed'?'bg-amber-500/10 border-amber-500 text-amber-400':'bg-rose-500/10 border-rose-500 text-rose-400'}`;
                } else {
                    btn.className = "py-3 rounded-xl border text-xs font-bold bg-slate-900 border-slate-700/60 text-slate-400 text-center transition-all";
                }
            });

            // Ẩn/Hiện khu vực chọn giờ dựa theo trạng thái đi làm
            const mainShiftBox = document.getElementById('main-shift-container');
            if (status === 'work') {
                mainShiftBox.classList.remove('hidden');
            } else {
                mainShiftBox.classList.add('hidden');
            }
        }

        function saveAttendance() {
            if (!selectedDayKey) return;
            let otH = 0;
            let otS = '18:00';
            let otE = '21:00';

            if (document.getElementById('ot-toggle').checked) {
                const val = parseFloat(document.getElementById('ot-hours').value); otH = isNaN(val) || val < 0 ? 0 : val;
                otS = document.getElementById('ot-start-time').value;
                otE = document.getElementById('ot-end-time').value;
            }
            
            let targetData = {
                status: selectedStatusStr || 'none',
                shiftHours: parseFloat(document.getElementById('shift-hours').value) || 8,
                mainStart: document.getElementById('main-start-time').value || '08:00',
                mainEnd: document.getElementById('main-end-time').value || '17:00',
                ot: otH, 
                otStart: otS,
                otEnd: otE,
                otMult: parseFloat(document.getElementById('ot-multiplier').value) || 1.5
            };

            // Ghi dữ liệu bền vững trực tiếp vào IndexedDB hệ thống
            let tx = db.transaction("attendance", "readwrite");
            tx.objectStore("attendance").put(targetData, selectedDayKey);

            tx.oncomplete = function() {
                attendanceData[selectedDayKey] = targetData;
                renderCalendar(); updateStats(); closeModal();
            };
        }

        window.onload = async function() { 
            await initDB();
            await loadDataFromDB();
            renderCalendar(); 
            updateStats(); 
        };
    </script>
</body>
</html>
